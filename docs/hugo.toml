baseURL = 'https://builderhub.github.io/Yamlfile/'
locale = 'en-us'
title = 'Yamlfile'

# Enable useful features for technical docs
enableGitInfo = true
pygmentsCodeFences = true
pygmentsStyle = 'monokai'

disableKinds = ["taxonomy", "term"]

[params]
  description = 'BuildKit frontend for intuitive, declarative, parallel, multi-file, secret-aware builds.'
  author = 'BuilderHub'
  # Useful for "edit this page" links if we add partials later
  github_repo = 'https://github.com/BuilderHub/Yamlfile'
  github_branch = 'main'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # allow raw HTML in markdown if needed for examples
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3

[outputFormats]
  [outputFormats.SearchIndex]
    mediaType = "application/json"
    baseName = "search-index"
    isPlainText = true
    notAlternative = true

[outputs]
  home = ["HTML", "RSS", "SearchIndex"]
  section = ["HTML", "RSS"]
  page = ["HTML"]
