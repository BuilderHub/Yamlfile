baseURL = 'https://builderhub.github.io/Yamlfile/'
languageCode = 'en-us'
title = 'Yamlfile'
theme = 'hugo-book'

disablePathToLower = true
enableGitInfo = true
disableKinds = ["taxonomy", "term"]

[module]
[[module.imports]]
  path = 'github.com/alex-shpak/hugo-book'

[params]
  description = 'BuildKit frontend for intuitive, declarative, parallel, multi-file, secret-aware builds.'
  author = 'BuilderHub'
  BookTheme = 'auto'
  BookSearch = true
  BookToC = true
  BookSection = 'docs'
  BookRepo = 'https://github.com/BuilderHub/Yamlfile'
  BookEditLink = '{{ .Site.Params.BookRepo }}/edit/main/docs/{{ .Path }}'
  BookLastChangeLink = '{{ .Site.Params.BookRepo }}/commit/{{ .GitInfo.Hash }}'

[[menu.after]]
  name = 'GitHub'
  url = 'https://github.com/BuilderHub/Yamlfile'
  weight = 10

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
  [markup.highlight]
    style = 'monokai'
