<nav class="toctree" aria-label="Documentation">
  <ul class="toctree-root">
    {{ $current := . }}
    {{ range .Site.Home.Pages.ByWeight }}
      {{ $isActive := or (eq .RelPermalink $current.RelPermalink) (.IsAncestor $current) }}
      <li class="toctree-item{{ if $isActive }} is-active-branch{{ end }}">
        <a href="{{ .RelPermalink }}"{{ if eq .RelPermalink $current.RelPermalink }} aria-current="page"{{ end }}>{{ .Title }}</a>
        {{ if .IsSection }}
          <ul class="toctree-children">
            {{ range .Pages.ByWeight }}
              <li class="toctree-item{{ if eq .RelPermalink $current.RelPermalink }} is-active{{ end }}">
                <a href="{{ .RelPermalink }}"{{ if eq .RelPermalink $current.RelPermalink }} aria-current="page"{{ end }}>{{ .Title }}</a>
              </li>
            {{ end }}
          </ul>
        {{ end }}
      </li>
    {{ end }}
  </ul>
</nav>
