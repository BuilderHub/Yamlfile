<!DOCTYPE html>
<html lang="en" data-baseurl="{{ .Site.BaseURL }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  {{ partial "header.html" . }}
  <div class="page-layout">
    <aside class="sidebar">
      {{ partial "toctree.html" . }}
    </aside>
    <main class="content">
      {{ block "main" . }}{{ end }}
    </main>
  </div>
  {{ partial "footer.html" . }}
  <script src="{{ .Site.BaseURL }}js/fuse.min.js"></script>
  <script src="{{ .Site.BaseURL }}js/search.js"></script>
</body>
</html>
