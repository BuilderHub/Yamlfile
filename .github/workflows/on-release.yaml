---
name: On Release

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image (traditional docker/build-push-action)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./cmd/yamlfile-frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/builderhub/yamlfile:latest
            ghcr.io/builderhub/yamlfile:${{ github.sha }}
            ghcr.io/builderhub/yamlfile:${{ github.event.release.tag_name }}
          annotations: |
            org.opencontainers.image.source=https://github.com/builderhub/yamlfile
            org.opencontainers.image.description=BuildKit frontend for intuitive, parallel, secret-aware multi-target Yamlfiles (v1alpha1)
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.authors=BuilderHub
            org.opencontainers.image.url=https://github.com/builderhub/yamlfile
            org.opencontainers.image.documentation=https://github.com/builderhub/yamlfile/blob/main/README.md
            org.opencontainers.image.vendor=BuilderHub
            org.opencontainers.image.version=${{ github.event.release.tag_name }}
            org.opencontainers.image.revision=${{ github.sha }}
